    - manager
    - team_leader
    - team_member
  stats_revenue:
    name: 총 매출
    default_roles:
    - chief_director
    - director
    - manager
  stats_revenue_noninsured:
    name: 비급여 매출
    default_roles:
    - chief_director
    - director
  chart_7day:
    name: 7일 추이 차트
    default_roles:
    - chief_director
    - director
    - manager
