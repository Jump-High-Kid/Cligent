beta:
  blog_limit_total: 25
  prompt_copy_limit: 999
  trial_days: 15
  image_regen_per_blog: 1
  image_edit_per_blog: 2
flow:
  questions_enabled: false
  questions_count: 3
blog:
  min_chars: 1500
  max_chars: 2000
  tone: 전문적
  include_hospital_info: true
prompts:
  questions: prompts/questions.txt
  conversation: prompts/conversation.txt
  blog: prompts/blog.txt
  image_analysis: prompts/image_analysis.txt
  image_generation: prompts/image_generation.txt
image_prompt:
  ai_platforms:
    midjourney:
      name: Midjourney
      url: https://www.midjourney.com/imagine
    dalle:
      name: DALL-E
      url: https://chatgpt.com
    nanobana:
      name: 나노바나나
      url: https://www.nanobana.ai
modules:
  stats_patients:
    name: 환자 수
    default_roles:
    - chief_director
