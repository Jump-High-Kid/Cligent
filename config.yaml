# Cligent 블로그 생성기 설정
# 이 파일만 수정하면 코드 변경 없이 동작을 바꿀 수 있습니다.

flow:
  questions_enabled: true   # false 로 바꾸면 질문 단계 없이 바로 생성
  questions_count: 3        # 질문 개수 (1~5)

blog:
  min_chars: 1500
  max_chars: 2000
  tone: "전문적"            # 전문적 / 친근한 / 설명적
  include_hospital_info: true

prompts:
  questions: "prompts/questions.txt"
  conversation: "prompts/conversation.txt"
  blog: "prompts/blog.txt"
  image_prompt: "prompts/image_prompt.txt"

# 대시보드 모듈 설정
# default_roles: 기본으로 볼 수 있는 역할 (5단계 RBAC)
#   chief_director(대표원장) > director(원장) > manager(매니저) > team_leader(팀장) > team_member(팀원)
# 실제 적용 권한은 data/rbac_permissions.json 기준 (위자드 저장 후 우선)
# 직원별 개별 설정은 data/staff_permissions.json에서 덮어쓸 수 있음
modules:
  stats_patients:
    name: "환자 수"
    default_roles: [chief_director, director, manager, team_leader, team_member]
  stats_appointments:
    name: "예약 건수"
    default_roles: [chief_director, director, manager, team_leader, team_member]
  stats_cancellations:
    name: "예약 취소"
    default_roles: [chief_director, director, manager, team_leader, team_member]
  stats_revenue:
    name: "총 매출"
    default_roles: [chief_director, director, manager]
  stats_revenue_noninsured:
    name: "비급여 매출"
    default_roles: [chief_director, director]
  chart_7day:
    name: "7일 추이 차트"
    default_roles: [chief_director, director, manager, team_leader, team_member]
  crm_actions:
    name: "후속 조치 리스트"
    default_roles: [chief_director, director, manager, team_leader]
  blog_generator:
    name: "Blog Generator"
    default_roles: [chief_director, director, manager, team_leader]
  insights:
    name: "New Insights"
    default_roles: [chief_director, director]
  education_videos:
    name: "교육 영상"
    default_roles: [chief_director, director, manager, team_leader, team_member]
