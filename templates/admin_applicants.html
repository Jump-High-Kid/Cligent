<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cligent 어드민 — 베타 신청자</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet"/>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
  <link rel="apple-touch-icon" href="/static/favicon.svg"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: #f5f5f4;
      color: #1c1917;
      min-height: 100dvh;
    }

    header {
      background: #064e3b;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { color: #fff; font-size: 18px; font-weight: 700; }
    header span { color: #6ee7b7; font-size: 13px; }

    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* 통계 카드 */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: #fff;
      border-radius: 14px;
      padding: 18px 20px;
      border: 1px solid #e7e5e4;
    }

    .stat-card .label { font-size: 12px; color: #78716c; margin-bottom: 6px; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: #064e3b; }

    /* 필터 + 액션 */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 7px 16px;
      border: 1.5px solid #e7e5e4;
      border-radius: 20px;
      background: #fff;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      color: #44403c;
    }

    .filter-btn.active {
      background: #064e3b;
      color: #fff;
      border-color: #064e3b;
    }

    .spacer { flex: 1; }

    .btn-invite {
      padding: 9px 20px;
      background: #064e3b;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-invite:hover { opacity: 0.85; }
    .btn-invite:disabled { opacity: 0.45; cursor: not-allowed; }

    /* 테이블 */
    .table-wrap {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e7e5e4;
      overflow: auto;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      padding: 13px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #78716c;
      text-align: left;
      border-bottom: 1px solid #f0efee;
      white-space: nowrap;
    }

    thead th:first-child { width: 40px; }

    tbody tr { transition: background 0.1s; }
    tbody tr:hover { background: #fafaf9; }

    tbody td {
      padding: 12px 16px;
      font-size: 13px;
      color: #1c1917;
      border-bottom: 1px solid #f5f5f4;
      vertical-align: middle;
    }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .s-pending    { background: #fef3c7; color: #92400e; }
    .s-invited    { background: #dbeafe; color: #1e40af; }
    .s-registered { background: #d1fae5; color: #065f46; }

    .sub-text { color: #a8a29e; font-size: 11px; }

    /* 알림 토스트 */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1c1917;
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 9999;
    }

    #toast.show { opacity: 1; }

    /* 빈 상태 */
    .empty { text-align: center; padding: 48px 0; color: #a8a29e; font-size: 14px; }

    /* 시크릿 모달 */
    #secret-modal {
      display: flex;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center; justify-content: center;
      z-index: 10000;
    }
    #secret-modal.hidden { display: none; }
    .secret-box {
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px;
      width: 380px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .secret-box h2 { font-size: 17px; font-weight: 700; margin-bottom: 8px; color: #1c1917; }
    .secret-box p  { font-size: 13px; color: #78716c; margin-bottom: 20px; }
    .secret-box input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid #d4d0cb; border-radius: 10px;
      font-size: 14px; font-family: monospace;
      margin-bottom: 16px; outline: none;
    }
    .secret-box input:focus { border-color: #064e3b; }
    .secret-box button {
      width: 100%; padding: 11px;
      background: #064e3b; color: #fff;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .secret-box button:hover { background: #065f46; }
  </style>
</head>
<body>

  <header>
    <h1>Cligent 어드민</h1>
    <span>베타 신청자 관리</span>
    <nav style="margin-left:auto;display:flex;gap:8px;">
      <a href="/admin/applicants" style="color:#6ee7b7;font-size:13px;text-decoration:none;padding:6px 14px;border-radius:8px;border:1px solid rgba(110,231,183,0.4);background:rgba(110,231,183,0.15);">베타 신청자</a>
      <a href="/admin/settings" style="color:#6ee7b7;font-size:13px;text-decoration:none;padding:6px 14px;border-radius:8px;border:1px solid rgba(110,231,183,0.4);">시스템 설정</a>
    </nav>
  </header>

  <div class="container">
    <!-- 통계 -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="label">전체 신청</div>
        <div class="value" id="s-total">—</div>
      </div>
      <div class="stat-card">
        <div class="label">대기 중</div>
        <div class="value" id="s-pending" style="color:#92400e;">—</div>
      </div>
      <div class="stat-card">
        <div class="label">초대 발송</div>
        <div class="value" id="s-invited" style="color:#1e40af;">—</div>
      </div>
      <div class="stat-card">
        <div class="label">링크 클릭</div>
        <div class="value" id="s-clicked" style="color:#7c3aed;">—</div>
      </div>
      <div class="stat-card">
        <div class="label">가입 완료</div>
        <div class="value" id="s-registered" style="color:#065f46;">—</div>
      </div>
    </div>

    <!-- 필터 + 초대 버튼 -->
    <div class="toolbar">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">대기</button>
      <button class="filter-btn" onclick="setFilter('invited', this)">초대됨</button>
      <button class="filter-btn" onclick="setFilter('registered', this)">가입완료</button>
      <div class="spacer"></div>
      <button class="btn-invite" id="btn-invite" onclick="inviteSelected()" disabled>
        선택 항목 초대 발송
      </button>
    </div>

    <!-- 신청자 테이블 -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" id="chk-all" onchange="toggleAll(this)"></th>
            <th>이름</th>
            <th>한의원</th>
            <th>이메일</th>
            <th>연락처</th>
            <th>상태</th>
            <th>신청일</th>
            <th>초대일</th>
            <th>클릭일</th>
            <th>메모</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty-msg" style="display:none;">신청자가 없습니다.</div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    let allData   = [];
    let curFilter = 'all';

    async function loadData() {
      try {
        const res = await fetch('/api/admin/applicants');
        if (res.status === 401 || res.status === 403) {
          location.href = '/login?next=/admin/applicants';
          return;
        }
        const data = await res.json();

        allData = data.applicants || [];
        const s  = data.stats || {};

        document.getElementById('s-total').textContent     = s.total      ?? 0;
        document.getElementById('s-pending').textContent   = s.pending    ?? 0;
        document.getElementById('s-invited').textContent   = s.invited    ?? 0;
        document.getElementById('s-clicked').textContent   = s.clicked    ?? 0;
        document.getElementById('s-registered').textContent = s.registered ?? 0;

        renderTable();
      } catch (e) {
        showToast('데이터 로드 실패: ' + e.message);
      }
    }

    function renderTable() {
      const filtered = curFilter === 'all'
        ? allData
        : allData.filter(r => r.status === curFilter);

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';

      if (!filtered.length) {
        document.getElementById('empty-msg').style.display = 'block';
        return;
      }
      document.getElementById('empty-msg').style.display = 'none';

      for (const r of filtered) {
        const tr = document.createElement('tr');
        const canSelect = r.status === 'pending';
        tr.innerHTML = `
          <td><input type="checkbox" class="row-chk" value="${r.id}" ${canSelect ? '' : 'disabled'}
              onchange="updateInviteBtn()"></td>
          <td><strong>${esc(r.name)}</strong></td>
          <td>${esc(r.clinic_name)}</td>
          <td>${esc(r.email)}</td>
          <td>${esc(r.phone || '—')}</td>
          <td><span class="status-badge s-${r.status}">${statusLabel(r.status)}</span></td>
          <td><span class="sub-text">${fmtDate(r.applied_at)}</span></td>
          <td><span class="sub-text">${fmtDate(r.invited_at)}</span></td>
          <td><span class="sub-text">${fmtDate(r.clicked_at)}</span></td>
          <td style="max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
              title="${esc(r.note || '')}">${esc(r.note || '—')}</td>
        `;
        tbody.appendChild(tr);
      }

      updateInviteBtn();
    }

    function setFilter(f, btn) {
      curFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTable();
    }

    function toggleAll(master) {
      document.querySelectorAll('.row-chk:not(:disabled)').forEach(c => {
        c.checked = master.checked;
      });
      updateInviteBtn();
    }

    function updateInviteBtn() {
      const count = document.querySelectorAll('.row-chk:checked').length;
      const btn = document.getElementById('btn-invite');
      btn.disabled = count === 0;
      btn.textContent = count > 0 ? `선택 항목 초대 발송 (${count}명)` : '선택 항목 초대 발송';
    }

    async function inviteSelected() {
      const ids = [...document.querySelectorAll('.row-chk:checked')].map(c => +c.value);
      if (!ids.length) return;

      if (!confirm(`${ids.length}명에게 초대 이메일을 발송하시겠습니까?`)) return;

      document.getElementById('btn-invite').disabled = true;

      try {
        const res = await fetch('/api/admin/invite-batch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids }),
        });
        const data = await res.json();

        const ok  = data.invited?.length ?? 0;
        const bad = data.failed?.length ?? 0;
        showToast(`초대 완료: ${ok}명${bad ? ` / 실패: ${bad}명` : ''}`);
        await loadData();
      } catch (e) {
        showToast('초대 발송 실패: ' + e.message);
        document.getElementById('btn-invite').disabled = false;
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function statusLabel(s) {
      return { pending: '대기', invited: '초대됨', registered: '가입완료' }[s] || s;
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      return iso.replace('T', ' ').slice(0, 16).replace('+00:00','');
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    // 세션 + is_admin 으로 자동 로드 (실패 시 /login 리다이렉트)
    loadData();
  </script>
</body>
</html>
