<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 찾기 — Cligent</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet"/>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
<link rel="apple-touch-icon" href="/static/favicon.svg"/>
<meta name="robots" content="noindex"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text: #1a1a18;
    --muted: #6b6960;
    --accent: #064e3b;
    --accent-hover: #053e2f;
    --error: #c0392b;
    --success: #047857;
    --radius: 10px;
    --shadow: 0 2px 16px rgba(0,0,0,0.08);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
  }

  .cligent-logo {
    --size: 48px;
    display: flex;
    align-items: center;
    gap: calc(var(--size) * 0.28);
    text-decoration: none;
    margin-bottom: 28px;
  }
  .cligent-mark {
    width: var(--size);
    height: var(--size);
    flex-shrink: 0;
  }
  .cligent-mark svg { width: 100%; height: 100%; }
  .cligent-word {
    font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
    font-weight: 900;
    font-size: calc(var(--size) * 0.62);
    letter-spacing: -0.045em;
    color: #064e3b;
    line-height: 1;
  }

  h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }

  .lead {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.5;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
  }

  input[type="email"] {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 16px;
  }

  input:focus { border-color: var(--accent); background: #fff; }

  .btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 4px;
  }

  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.6; cursor: default; }

  .msg-box {
    padding: 12px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 16px;
    display: none;
  }
  .msg-box.error {
    background: #fdf0ef;
    border: 1px solid #f5c6c2;
    color: var(--error);
  }
  .msg-box.success {
    background: #ecfdf5;
    border: 1px solid #a7f3d0;
    color: var(--success);
  }

  .switch-link {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-top: 16px;
  }
  .switch-link a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    cursor: pointer;
  }

  .section { display: none; }
  .section.active { display: block; }
</style>
</head>
<body>

<div class="card">
  <div class="cligent-logo">
    <div class="cligent-mark">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <symbol id="sparkle" viewBox="-72 -72 144 144">
            <path d="M0,-72 C 12,-22 26,-12 72,0 C 26,12 12,22 0,72 C -12,22 -26,12 -72,0 C -26,-12 -12,-22 0,-72 Z"/>
          </symbol>
        </defs>
        <rect width="32" height="32" rx="7" fill="#064e3b"/>
        <text x="4" y="25"
          font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
          font-size="22" font-weight="900" fill="#ffffff">C</text>
        <g transform="translate(23 8) scale(0.08)" fill="#ffffff">
          <use href="#sparkle"/>
          <use href="#sparkle" transform="translate(78 -60) scale(.55)"/>
          <use href="#sparkle" transform="translate(86 60) scale(.4)"/>
        </g>
      </svg>
    </div>
    <span class="cligent-word">Cligent</span>
  </div>

  <!-- ── 입력 섹션 ── -->
  <div id="formSection" class="section active">
    <h1>비밀번호 찾기</h1>
    <p class="lead">
      가입하신 이메일을 입력하시면, 비밀번호 재설정 링크를 메일로 보내드립니다.
      링크는 <strong>72시간</strong> 동안 유효합니다.
    </p>

    <div id="errorMsg" class="msg-box error"></div>

    <label for="email">이메일</label>
    <input type="email" id="email" placeholder="clinic@example.com" autocomplete="email" autofocus>

    <button class="btn" id="submitBtn" onclick="doForgot()">재설정 링크 받기</button>

    <div class="switch-link">
      <a href="/login">로그인으로 돌아가기</a>
    </div>
  </div>

  <!-- ── 발송 완료 섹션 ── -->
  <div id="doneSection" class="section">
    <h1>메일을 확인해주세요</h1>
    <div class="msg-box success" style="display:block;">
      입력하신 이메일이 등록되어 있다면, 비밀번호 재설정 링크를 보내드렸습니다.
      메일함(스팸함 포함)을 확인해 주세요.
    </div>
    <p class="lead">
      메일이 도착하지 않았다면 1~2분 후 다시 시도하시거나,
      <a href="mailto:cligent.ai@gmail.com" style="color:var(--accent);">cligent.ai@gmail.com</a>으로 문의해 주세요.
    </p>
    <div class="switch-link">
      <a href="/login">로그인으로 돌아가기</a>
    </div>
  </div>
</div>

<script>
  function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function clearError() {
    document.getElementById('errorMsg').style.display = 'none';
  }

  async function doForgot() {
    clearError();
    const email = document.getElementById('email').value.trim();
    const btn = document.getElementById('submitBtn');

    if (!email || !email.includes('@')) {
      showError('올바른 이메일을 입력해주세요.');
      return;
    }

    btn.disabled = true;
    btn.textContent = '발송 중...';

    try {
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json().catch(() => ({}));

      // 보안: 등록 여부와 무관하게 동일 응답 (이메일 enumeration 방지)
      if (res.status === 429) {
        showError(data.detail || '잠시 후 다시 시도해주세요.');
        btn.disabled = false;
        btn.textContent = '재설정 링크 받기';
        return;
      }

      // 200 또는 etc — 동일 성공 화면
      showSection('doneSection');
    } catch {
      showError('서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.');
      btn.disabled = false;
      btn.textContent = '재설정 링크 받기';
    }
  }

  // Enter 키로 제출
  document.getElementById('email').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doForgot();
  });
</script>

</body>
</html>
