<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cligent 베타 신청</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: #f5f5f4;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .card-header {
      background: #064e3b;
      padding: 28px 32px;
    }

    .card-header h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .card-header p {
      color: #6ee7b7;
      font-size: 14px;
      margin-top: 6px;
    }

    .card-body {
      padding: 32px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #44403c;
      margin-bottom: 6px;
    }

    label .req {
      color: #ef4444;
      margin-left: 2px;
    }

    input, textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e7e5e4;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: #1c1917;
      background: #fafaf9;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, textarea:focus {
      border-color: #064e3b;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 72px;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #064e3b;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .notice {
      font-size: 12px;
      color: #78716c;
      margin-top: 12px;
      line-height: 1.6;
      text-align: center;
    }

    /* 상태 메시지 */
    .msg {
      display: none;
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 14px;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .msg.error   { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
    .msg.success { background: #ecfdf5; border: 1px solid #6ee7b7; color: #065f46; }

    /* 완료 화면 */
    #done-screen {
      display: none;
      text-align: center;
      padding: 40px 32px;
    }

    #done-screen .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    #done-screen h2 {
      font-size: 20px;
      font-weight: 700;
      color: #064e3b;
      margin-bottom: 8px;
    }

    #done-screen p {
      color: #57534e;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>Cligent 베타 신청</h1>
      <p>한의원 업무를 AI로 더 스마트하게</p>
    </div>

    <!-- 신청 폼 -->
    <div class="card-body" id="form-area">
      <div class="msg error" id="err-msg"></div>

      <div class="field">
        <label>이름 <span class="req">*</span></label>
        <input type="text" id="f-name" placeholder="홍길동" autocomplete="name">
      </div>

      <div class="field">
        <label>한의원명 <span class="req">*</span></label>
        <input type="text" id="f-clinic" placeholder="길동 한의원">
      </div>

      <div class="field">
        <label>이메일 <span class="req">*</span></label>
        <input type="email" id="f-email" placeholder="doctor@example.com" autocomplete="email">
      </div>

      <div class="field">
        <label>연락처 <span style="color:#a8a29e; font-weight:400;">(선택)</span></label>
        <input type="tel" id="f-phone" placeholder="010-0000-0000" autocomplete="tel">
      </div>

      <div class="field">
        <label>궁금하신 점 또는 기대하는 기능 <span style="color:#a8a29e; font-weight:400;">(선택)</span></label>
        <textarea id="f-note" placeholder="자유롭게 적어주세요"></textarea>
      </div>

      <button class="btn-submit" id="btn-submit" onclick="submitApply()">신청하기</button>

      <p class="notice">
        입력하신 정보는 베타 초대 발송 목적으로만 사용되며,<br>
        별도 동의 없이 제3자에게 제공되지 않습니다.
      </p>
    </div>

    <!-- 완료 화면 -->
    <div id="done-screen">
      <div class="icon">✅</div>
      <h2>신청이 접수되었습니다!</h2>
      <p>검토 후 이메일로 초대 링크를 보내드리겠습니다.<br>조금만 기다려 주세요.</p>
    </div>
  </div>

  <script>
    async function submitApply() {
      const btn = document.getElementById('btn-submit');
      const errMsg = document.getElementById('err-msg');

      const name       = document.getElementById('f-name').value.trim();
      const clinicName = document.getElementById('f-clinic').value.trim();
      const email      = document.getElementById('f-email').value.trim();
      const phone      = document.getElementById('f-phone').value.trim();
      const note       = document.getElementById('f-note').value.trim();

      errMsg.style.display = 'none';

      if (!name || !clinicName) {
        showErr('이름과 한의원명을 입력해 주세요.');
        return;
      }
      if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
        showErr('유효한 이메일 주소를 입력해 주세요.');
        return;
      }

      btn.disabled = true;
      btn.textContent = '신청 중…';

      try {
        const res = await fetch('/api/beta/apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, clinic_name: clinicName, email, phone, note }),
        });

        const data = await res.json();

        if (!res.ok) {
          showErr(data.detail || '신청 중 오류가 발생했습니다.');
          btn.disabled = false;
          btn.textContent = '신청하기';
          return;
        }

        // 성공 (중복 포함)
        document.getElementById('form-area').style.display = 'none';
        document.getElementById('done-screen').style.display = 'block';

      } catch (e) {
        showErr('네트워크 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
        btn.disabled = false;
        btn.textContent = '신청하기';
      }
    }

    function showErr(msg) {
      const el = document.getElementById('err-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
