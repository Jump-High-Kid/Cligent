<!DOCTYPE html>
<html lang="ko" class="cligent-booting">
<head>
  <script src="/static/js/ensure_app_shell.js"></script>
<link rel="preload" as="font" type="font/woff2" href="/static/fonts/PretendardVariable.woff2" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="/static/fonts/material-symbols-outlined.woff2" crossorigin>
<link href="/static/fonts.css" rel="stylesheet"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cligent - 공지 작성</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script>
  tailwind.config = { theme: { extend: { fontFamily: { sans: ['Pretendard', 'sans-serif'] } } } };
</script>
<style>
  body { font-family: 'Pretendard', sans-serif; background: #fafaf9; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
  textarea { font-family: 'Pretendard', sans-serif; }
  .markdown { color: #1c1917; line-height: 1.75; }
  .markdown h1 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0 0.5rem; color: #064e3b; }
  .markdown h2 { font-size: 1.25rem; font-weight: 700; margin: 1rem 0 0.5rem; color: #064e3b; }
  .markdown ul { padding-left: 1.5rem; list-style: disc; margin: 0.5rem 0; }
  .markdown ol { padding-left: 1.5rem; list-style: decimal; margin: 0.5rem 0; }
  .markdown img { max-width: 100%; height: auto; border-radius: 0.5rem; }
</style>
<script>document.addEventListener('DOMContentLoaded',function(){requestAnimationFrame(function(){document.documentElement.classList.add('cligent-ready');});});</script>
<noscript><style>html.cligent-booting{visibility:visible !important;}</style></noscript>
</head>
<body class="text-stone-800">

<main class="max-w-3xl mx-auto px-4 sm:px-6 py-6 sm:py-10">
  <a href="/announcements"
    class="inline-flex items-center gap-1 text-sm text-stone-500 hover:text-stone-800 mb-4">
    <span class="material-symbols-outlined text-[18px]">arrow_back</span>
    <span>공지사항 목록</span>
  </a>

  <h1 id="pageTitle" class="text-2xl sm:text-3xl font-bold text-stone-900 mb-6">공지 작성</h1>

  <form id="form" class="space-y-4 bg-white border border-stone-200 rounded-2xl p-5 sm:p-6">
    <div>
      <label class="block text-xs font-semibold text-stone-600 mb-1">제목</label>
      <input id="title" type="text" required maxlength="200"
        class="w-full px-3 py-2.5 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-emerald-500"
        placeholder="공지 제목"/>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-xs font-semibold text-stone-600 mb-1">카테고리</label>
        <select id="category" class="w-full px-3 py-2.5 border border-stone-200 rounded-xl text-sm bg-white focus:outline-none focus:border-emerald-500">
          <option value="update">업데이트</option>
          <option value="maintenance">점검 안내</option>
          <option value="general">일반 공지</option>
        </select>
      </div>
      <div class="flex items-end">
        <label class="inline-flex items-center gap-2 px-3 py-2.5 cursor-pointer">
          <input id="isPinned" type="checkbox" class="rounded border-stone-300 text-emerald-700 focus:ring-emerald-500"/>
          <span class="text-sm text-stone-700">상단 고정</span>
        </label>
      </div>
    </div>

    <div>
      <div class="flex items-center justify-between mb-1">
        <label class="block text-xs font-semibold text-stone-600">본문 (Markdown)</label>
        <div class="flex items-center gap-1.5">
          <button type="button" onclick="document.getElementById('imgInput').click()"
            class="inline-flex items-center gap-1 px-2 py-1 bg-stone-100 hover:bg-stone-200 rounded-lg text-xs text-stone-700">
            <span class="material-symbols-outlined text-[14px]">image</span>
            <span>이미지</span>
          </button>
          <button type="button" onclick="togglePreview()"
            class="inline-flex items-center gap-1 px-2 py-1 bg-stone-100 hover:bg-stone-200 rounded-lg text-xs text-stone-700">
            <span class="material-symbols-outlined text-[14px]" id="previewIcon">visibility</span>
            <span id="previewLabel">미리보기</span>
          </button>
        </div>
      </div>
      <input id="imgInput" type="file" accept=".jpg,.jpeg,.png,.webp,.gif" style="display:none;" onchange="uploadImage(event)"/>
      <textarea id="bodyMd" required rows="18"
        class="w-full px-3 py-2.5 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-emerald-500 font-mono"
        placeholder="## 제목&#10;&#10;- 항목&#10;- 항목&#10;&#10;**굵은 글씨** *기울임*"></textarea>
      <div id="preview" style="display:none;" class="mt-2 px-4 py-3 border border-stone-200 rounded-xl bg-stone-50">
        <div class="text-xs font-semibold text-stone-400 mb-2">미리보기</div>
        <div id="previewBody" class="markdown"></div>
      </div>
    </div>

    <div id="errorBox" style="display:none;" class="text-sm text-red-600 px-3 py-2 bg-red-50 border border-red-200 rounded-lg"></div>

    <div class="flex items-center gap-2 pt-2">
      <button type="submit" id="saveBtn"
        class="flex-1 px-4 py-3 bg-emerald-900 text-white rounded-xl font-semibold text-sm hover:bg-emerald-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
        저장
      </button>
      <a href="/announcements"
        class="px-4 py-3 bg-stone-100 text-stone-700 rounded-xl font-semibold text-sm hover:bg-stone-200 transition-colors">
        취소
      </a>
    </div>
  </form>
</main>

<script>
  function getEditId() {
    const m = location.pathname.match(/\/announcements\/(\d+)\/edit/);
    return m ? parseInt(m[1], 10) : null;
  }
  const editId = getEditId();
  if (editId) document.getElementById('pageTitle').textContent = '공지 수정';

  // 권한 체크
  (async () => {
    try {
      const res = await fetch('/api/auth/me');
      if (!res.ok) { window.location.href = '/login'; return; }
      const me = await res.json();
      if (!me.is_admin) {
        alert('공지 작성 권한이 없습니다.');
        window.location.href = '/announcements';
      }
    } catch (_) {}
  })();

  // 수정 모드: 기존 데이터 로드
  if (editId) {
    fetch(`/api/announcements/${editId}`)
      .then(r => r.json())
      .then(a => {
        document.getElementById('title').value = a.title || '';
        document.getElementById('bodyMd').value = a.body_md || '';
        document.getElementById('category').value = a.category || 'general';
        document.getElementById('isPinned').checked = !!a.is_pinned;
      });
  }

  function togglePreview() {
    const pre = document.getElementById('preview');
    const showing = pre.style.display !== 'none';
    if (showing) {
      pre.style.display = 'none';
      document.getElementById('previewLabel').textContent = '미리보기';
      document.getElementById('previewIcon').textContent = 'visibility';
    } else {
      const md = document.getElementById('bodyMd').value;
      document.getElementById('previewBody').innerHTML = DOMPurify.sanitize(marked.parse(md || ''));
      pre.style.display = 'block';
      document.getElementById('previewLabel').textContent = '편집';
      document.getElementById('previewIcon').textContent = 'edit';
    }
  }

  async function uploadImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('file', file);
    try {
      const res = await fetch('/api/announcements/upload-image', { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '업로드 실패');
      const ta = document.getElementById('bodyMd');
      const md = `\n\n![](${data.url})\n\n`;
      const cursor = ta.selectionStart;
      ta.value = ta.value.slice(0, cursor) + md + ta.value.slice(cursor);
      ta.focus();
    } catch (err) {
      alert('이미지 업로드 실패: ' + (err.message || '오류'));
    }
    e.target.value = '';
  }

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('saveBtn');
    const errBox = document.getElementById('errorBox');
    errBox.style.display = 'none';
    btn.disabled = true;
    btn.textContent = '저장 중...';

    const payload = {
      title: document.getElementById('title').value.trim(),
      body_md: document.getElementById('bodyMd').value.trim(),
      category: document.getElementById('category').value,
      is_pinned: document.getElementById('isPinned').checked,
    };

    try {
      const url = editId ? `/api/announcements/${editId}` : '/api/announcements';
      const method = editId ? 'PATCH' : 'POST';
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '저장 실패');
      const targetId = editId || data.id;
      window.location.href = `/announcements/${targetId}`;
    } catch (err) {
      errBox.textContent = err.message || '저장 실패';
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '저장';
    }
  });
</script>
</body>
</html>
