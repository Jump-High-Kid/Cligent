<!DOCTYPE html>
<html lang="ko" class="cligent-booting">
<head>
  <script src="/static/js/ensure_app_shell.js"></script>
<link rel="preload" as="font" type="font/woff2" href="/static/fonts/PretendardVariable.woff2" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="/static/fonts/material-symbols-outlined.woff2" crossorigin>
<link href="/static/fonts.css" rel="stylesheet"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cligent — 클리닉 관리</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = { theme: { extend: { fontFamily: { sans: ['Pretendard', 'sans-serif'] } } } };
</script>
<style>
  body { font-family: 'Pretendard', sans-serif; background: #fafaf9; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
  table { font-size: 13px; }
  th, td { padding: 8px 10px; border-bottom: 1px solid #e7e5e4; vertical-align: middle; }
  th { background: #f5f5f4; text-align: left; font-weight: 600; color: #44403c; white-space: nowrap; }
  tr:hover td { background: #fafaf9; }
  .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
  .b-free { background:#f5f5f4; color:#57534e; }
  .b-trial { background:#fffbeb; color:#92400e; border:1px solid #fde68a; }
  .b-paid { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
  .b-admin { background:#dbeafe; color:#1e40af; border:1px solid #bfdbfe; }
  .b-no { background:#fee2e2; color:#991b1b; border:1px solid #fecaca; }
  .b-yes { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
</style>
<script>document.addEventListener('DOMContentLoaded',function(){requestAnimationFrame(function(){document.documentElement.classList.add('cligent-ready');});});</script>
<noscript><style>html.cligent-booting{visibility:visible !important;}</style></noscript>
</head>
<body class="text-stone-800">

<main class="max-w-[1400px] mx-auto px-4 sm:px-6 py-6">
  <div class="flex items-center justify-between mb-4">
    <div>
      <a href="/admin" class="inline-flex items-center gap-1 text-sm text-stone-500 hover:text-stone-800 mb-1">
        <span class="material-symbols-outlined text-[16px]">arrow_back</span>관리자 메인
      </a>
      <h1 class="text-2xl font-bold text-stone-900">클리닉 / 사용자 목록</h1>
    </div>
    <button onclick="loadData()" class="inline-flex items-center gap-1 px-3 py-2 bg-stone-100 hover:bg-stone-200 rounded-lg text-sm text-stone-700">
      <span class="material-symbols-outlined text-[18px]">refresh</span>새로고침
    </button>
  </div>

  <div class="overflow-x-auto bg-white border border-stone-200 rounded-xl">
    <table class="w-full">
      <thead>
        <tr>
          <th>ID</th>
          <th>클리닉명</th>
          <th>가입일</th>
          <th>플랜</th>
          <th>trial 만료</th>
          <th>API 키</th>
          <th>이번 달</th>
          <th>총 사용</th>
          <th>마지막 접속</th>
          <th>활성 사용자</th>
          <th>액션</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="11" class="text-center py-10 text-stone-400">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- 트라이얼/플랜 수정 모달 -->
<div id="editModal" style="display:none;" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
  <div class="bg-white rounded-2xl shadow-xl max-w-md w-[90%] p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold">클리닉 메타 수정</h2>
      <button onclick="closeEdit()" class="text-stone-400 hover:text-stone-700"><span class="material-symbols-outlined">close</span></button>
    </div>
    <p class="text-xs text-stone-500 mb-4" id="editTarget"></p>
    <div class="space-y-3">
      <div>
        <label class="block text-xs font-semibold text-stone-600 mb-1">플랜</label>
        <select id="editPlan" class="w-full px-3 py-2 border border-stone-200 rounded-lg text-sm bg-white">
          <option value="">변경 안 함</option>
          <option value="free">free</option>
          <option value="standard">standard</option>
          <option value="pro">pro</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-semibold text-stone-600 mb-1">trial 만료 (ISO 8601)</label>
        <input id="editTrial" type="text" placeholder="2026-05-15T00:00:00+00:00" class="w-full px-3 py-2 border border-stone-200 rounded-lg text-sm font-mono"/>
        <p class="text-[11px] text-stone-400 mt-1">빈칸 유지 = 변경 없음 / 'null' 입력 = 제거</p>
      </div>
      <div>
        <label class="block text-xs font-semibold text-stone-600 mb-1">plan 만료 (ISO 8601)</label>
        <input id="editPlanExp" type="text" placeholder="2026-12-31T23:59:59+00:00" class="w-full px-3 py-2 border border-stone-200 rounded-lg text-sm font-mono"/>
      </div>
      <div id="editError" class="hidden text-sm text-red-600 px-3 py-2 bg-red-50 border border-red-200 rounded-lg"></div>
      <div class="flex gap-2 pt-2">
        <button onclick="saveEdit()" class="flex-1 px-4 py-2 bg-emerald-900 hover:bg-emerald-800 text-white rounded-lg font-semibold text-sm">저장</button>
        <button onclick="closeEdit()" class="px-4 py-2 bg-stone-100 hover:bg-stone-200 rounded-lg font-semibold text-sm">취소</button>
      </div>
    </div>
  </div>
</div>

<script>
  let _editingId = null;
  function fmtDate(iso) {
    if (!iso) return '—';
    return iso.replace('T', ' ').slice(0, 16).replace('+00:00','');
  }
  function planBadge(c) {
    if (c.is_admin_clinic) return '<span class="badge b-admin">admin</span>';
    if (c.plan_id === 'free') return '<span class="badge b-free">free</span>';
    if (c.plan_expires_at) return `<span class="badge b-paid">${c.plan_id}</span>`;
    if (c.trial_expires_at) {
      const exp = new Date(c.trial_expires_at);
      const days = Math.ceil((exp - new Date()) / 86400000);
      return `<span class="badge b-trial">trial · ${days}일</span>`;
    }
    return '<span class="badge b-free">' + (c.plan_id || 'free') + '</span>';
  }

  async function loadData() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '<tr><td colspan="11" class="text-center py-10 text-stone-400">불러오는 중...</td></tr>';
    try {
      const res = await fetch('/api/admin/clinics');
      if (res.status === 401 || res.status === 403) { location.href = '/login?next=/admin/clinics'; return; }
      const data = await res.json();
      const list = data.clinics || [];
      if (!list.length) {
        tbody.innerHTML = '<tr><td colspan="11" class="text-center py-10 text-stone-400">클리닉이 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = list.map(c => `
        <tr>
          <td class="text-stone-400">${c.id}</td>
          <td><strong>${esc(c.name)}</strong></td>
          <td class="text-stone-500">${fmtDate(c.created_at)}</td>
          <td>${planBadge(c)}</td>
          <td class="text-stone-500">${fmtDate(c.trial_expires_at)}</td>
          <td>${c.api_key_configured ? '<span class="badge b-yes">등록</span>' : '<span class="badge b-no">미등록</span>'}</td>
          <td><strong>${c.blog_this_month}</strong></td>
          <td class="text-stone-500">${c.usage_total}</td>
          <td class="text-stone-500">${fmtDate(c.last_seen)}</td>
          <td class="text-stone-500">${c.active_users}</td>
          <td>
            <button onclick="openEdit(${c.id}, ${JSON.stringify(c.name).replace(/"/g,'&quot;')})"
              class="text-emerald-900 text-sm font-semibold hover:underline">수정</button>
          </td>
        </tr>
      `).join('');
    } catch (e) {
      tbody.innerHTML = '<tr><td colspan="11" class="text-center py-10 text-red-500">불러오지 못했습니다.</td></tr>';
    }
  }

  function openEdit(id, name) {
    _editingId = id;
    document.getElementById('editTarget').textContent = `대상: ID ${id} · ${name}`;
    document.getElementById('editPlan').value = '';
    document.getElementById('editTrial').value = '';
    document.getElementById('editPlanExp').value = '';
    document.getElementById('editError').classList.add('hidden');
    document.getElementById('editModal').style.display = 'flex';
  }
  function closeEdit() {
    _editingId = null;
    document.getElementById('editModal').style.display = 'none';
  }
  async function saveEdit() {
    if (!_editingId) return;
    const payload = {};
    const plan = document.getElementById('editPlan').value;
    const trial = document.getElementById('editTrial').value.trim();
    const planExp = document.getElementById('editPlanExp').value.trim();
    if (plan) payload.plan_id = plan;
    if (trial !== '') payload.trial_expires_at = (trial.toLowerCase() === 'null' ? null : trial);
    if (planExp !== '') payload.plan_expires_at = (planExp.toLowerCase() === 'null' ? null : planExp);
    if (!Object.keys(payload).length) {
      const e = document.getElementById('editError'); e.textContent = '수정할 값을 입력해주세요.'; e.classList.remove('hidden'); return;
    }
    const res = await fetch(`/api/admin/clinic/${_editingId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) {
      const e = document.getElementById('editError'); e.textContent = data.detail || '저장 실패'; e.classList.remove('hidden'); return;
    }
    closeEdit();
    loadData();
  }
  function esc(s) {
    return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  loadData();
</script>
</body>
</html>
